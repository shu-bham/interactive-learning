version: '3.8'

services:
  postgresql-primary:
    image: postgres:16
    container_name: postgresql-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpass
      POSTGRES_DB: learning_db
    ports:
      - "5432:5432"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./config/pg_ident.conf:/etc/postgresql/pg_ident.conf
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - pg-network

  postgresql-replica:
    image: postgres:16
    container_name: postgresql-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpass
      POSTGRES_DB: learning_db
    ports:
      - "5433:5432"
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
    depends_on:
      - postgresql-primary
    networks:
      - pg-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@learning.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "8081:80"
    networks:
      - pg-network
    depends_on:
      - postgresql-primary

volumes:
  pg-primary-data:
  pg-replica-data:

networks:
  pg-network:
    driver: bridge
