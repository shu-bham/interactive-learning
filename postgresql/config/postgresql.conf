# -----------------------------
# PostgreSQL Configuration File
# -----------------------------

# Learning Optimized Settings

# CONNECTIONS AND AUTHENTICATION
listen_addresses = '*'
max_connections = 100
hba_file = '/etc/postgresql/pg_hba.conf'
ident_file = '/etc/postgresql/pg_ident.conf'

# MEMORY
shared_buffers = 128MB          # Starting small for learning demos
work_mem = 4MB
maintenance_work_mem = 64MB
dynamic_shared_memory_type = posix

# WRITE-AHEAD LOG (WAL)
wal_level = replica             # Needed for streaming replication later
archive_mode = on
archive_command = 'mkdir -p /var/lib/postgresql/data/archive && cp %p /var/lib/postgresql/data/archive/%f'
max_wal_size = 1GB
min_wal_size = 80MB

# REPLICATION
max_wal_senders = 10
max_replication_slots = 10

# QUERY PLANNING
random_page_cost = 1.1          # Optimized for SSDs (common on Macs)
effective_cache_size = 512MB

# REPORTING AND LOGGING
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'all'           # Log all statements for learning
log_duration = on
log_line_prefix = '%m [%p] %q%u@%d '
log_lock_waits = on             # Help debug locking increments

# STATISTICS
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# AUTOVACUUM
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# CLIENT CONNECTION DEFAULTS
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
